<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4236/4236786.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Camas | Hospital Villarrica</title>
  <script>
    window.addEventListener('error', function(event) {
      document.body.innerHTML = '<div style="background:red;color:white;padding:20px;font-family:sans-serif;z-index:99999;position:fixed;top:0;left:0;right:0;bottom:0;"><h1>Unhandled Error</h1><p>' + event.message + '</p><pre>' + event.error?.stack + '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function(event) {
      document.body.innerHTML = '<div style="background:red;color:white;padding:20px;font-family:sans-serif;z-index:99999;position:fixed;top:0;left:0;right:0;bottom:0;"><h1>Unhandled Promise Rejection</h1><p>' + event.reason + '</p></div>';
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
